seed: 42
runtime:
  device: cuda

output:
  root_dir: outputs/peel
  run_name: peel_new_dit_h16_c64_v3_rel

data:
  root_dir: /mnt/workspace/zyj/data/processed/peel/peel_new
  # window
  window_size: 16
  stride: 1
  n_image_steps: 1
  action_horizon: 64
  # robot
  action_type: joint
  action_representation: relative
  # tactile
  use_tactile: false
  # camera (cache stores 3 views; 2-view configs slice)
  camera_views: ['base_0', 'left_wrist_0', 'right_wrist_0']
  image_size: 224
  image_as_uint8: true
  use_camera_latent: true
  latent_cache_root_dir: ${data.root_dir}/latent_cache/dinov2_s14_w16_ah64
  camera_augmentation: false
  # keys
  camera_key: camera
  tactile_key: tactile
  state_key: state_30hz
  action_key: action_30hz
  norm:
    output_range: [-1, 1]
    max_windows: 50000

models:
  fm:
    cond_dim: 256
    n_image_views: 3
    image_encoder_name: dinov2
    dino_model_name: vit_small_patch14_dinov2.lvd142m
    freeze_image_encoder: true
    image_pretrained: true
    image_feat_dim: 256
    use_tactile: false
    tactile_feat_dim: 256
    tactile_temporal_pool: conv1d
    state_feat_dim: 256
    state_pool: flatten
    action_horizon: 64
    n_action_steps: 64
    diffusion_step_embed_dim: 256
    velocity_model: dit
    down_dims: [256, 512, 1024]
    kernel_size: 5
    n_groups: 8
    dit_hidden_dim: 512
    dit_depth: 14
    dit_num_heads: 8
    dit_mlp_ratio: 4.0
    dit_dropout: 0.1
    num_inference_steps: 16
    solver: euler

train:
  batch_size: 256
  num_workers: 8
  drop_last: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  epochs: 256
  grad_clip: 1.0
  use_amp: false
  open_loop_test_every: 256
  open_loop_test_max_batches: 16
  plot_samples: 64
  plot_dims: auto
  max_train_batches: null
  resume_path: null
  optimizer:
    lr: 1.0e-4
    min_lr: 1.0e-6
    weight_decay: 1.0e-4

checkpoint:
  save_every: 50

precompute:
  batch_size: 512
  device: cuda
  max_windows: null
  overwrite: false
  output_path: null

deploy:
  action_process: abs_qpos
  action_hz: 30.0
