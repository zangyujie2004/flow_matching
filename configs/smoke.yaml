seed: 42
runtime:
  device: cuda

output:
  root_dir: outputs
  run_name: smoke_train

data:
  root_dir: /mnt/workspace/zyj/data/processed/peel/peel_0630_1656
  window_size: 8
  stride: 1
  n_image_steps: 1
  action_horizon: 32
  action_type: eef
  action_representation: relative
  use_tactile: true
  image_size: 224
  image_as_uint8: true
  use_camera_latent: true
  latent_cache_root_dir: ${data.root_dir}
  camera_key: camera
  tactile_key: tactile
  state_key: state_30hz
  action_key: action_30hz
  norm:
    output_range: [-1, 1]
    max_windows: 100

models:
  fm:
    cond_dim: 256
    image_encoder_name: dinov2_small
    dino_model_name: vit_small_patch14_dinov2.lvd142m
    freeze_image_encoder: true
    image_pretrained: false
    image_feat_dim: 256
    n_image_views: 3
    use_tactile: true
    tactile_feat_dim: 256
    tactile_temporal_pool: conv1d
    state_feat_dim: 256
    state_pool: flatten
    action_horizon: 32
    n_action_steps: 32
    diffusion_step_embed_dim: 256
    down_dims: [256, 512, 1024]
    kernel_size: 5
    n_groups: 8
    num_inference_steps: 16
    solver: euler

train:
  batch_size: 2
  num_workers: 0
  drop_last: true
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  epochs: 1
  grad_clip: 1.0
  use_amp: false
  max_train_batches: 8
  open_loop_test_every: 1
  open_loop_test_max_batches: 2
  plot_samples: 4
  plot_dims: auto
  resume_path: null
  optimizer:
    lr: 1.0e-4
    min_lr: 1.0e-6
    weight_decay: 1.0e-4

checkpoint:
  save_every: 100

precompute:
  batch_size: 64
  device: cuda
  max_windows: null   # debug only; full run must cover all windows
  overwrite: true
  output_path: null
